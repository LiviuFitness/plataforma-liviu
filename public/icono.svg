<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Icono vectorial de respaldo, a juego con icono-512.png -->
  <defs>
    <radialGradient id="base" cx="50%" cy="35%" r="80%">
      <stop offset="0%" stop-color="#141a20"/>
      <stop offset="100%" stop-color="#0A0C0E"/>
    </radialGradient>
    <radialGradient id="glow" cx="50%" cy="118%" r="75%">
      <stop offset="0%" stop-color="#29ABE2" stop-opacity="0.38"/>
      <stop offset="55%" stop-color="#29ABE2" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#29ABE2" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="rail" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#29ABE2" stop-opacity="0"/>
      <stop offset="50%" stop-color="#29ABE2"/>
      <stop offset="100%" stop-color="#29ABE2" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" fill="url(#base)"/>
  <rect width="512" height="512" fill="url(#glow)"/>
  <text x="256" y="286" text-anchor="middle" font-family="'Inter Variable', Inter, -apple-system, sans-serif" font-weight="800" font-size="128" letter-spacing="-4" font-style="italic">
    <tspan fill="#FFFFFF">Liv</tspan><tspan fill="#3B6DB6">Fit</tspan>
  </text>
  <rect x="146" y="330" width="220" height="7" rx="3.5" fill="url(#rail)"/>
</svg>
